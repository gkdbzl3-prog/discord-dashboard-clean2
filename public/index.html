<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STUDY DASHBOARD</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
</head>

<body class="dark">
  <header>
    <img class="blog-hero" src="./images/header.jpg" onclick="window.showToday()" alt="header">
  </header>

  <div class="page-wrapper">
    <div id="view"></div>
  </div>

  <button class="theme-toggle" onclick="toggleTheme()">☀</button>

  <div class="fab-container" id="fab-menu">
    <button class="fab-btn fab-main" id="fabMain" aria-label="menu">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M12 5V19M5 12H19" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="fab-btn" id="fabEdit">Edit</button>
    <button class="fab-btn" id="fabOverview">Overview</button>
    <button class="fab-btn" id="fabMemo">Memo</button>
  </div>

  <div id="memoModal" class="modal-overlay" style="display:none;">
    <div class="memo-modal">
      <div class="memo-header">
        <h2>📝 MEMO</h2>
      </div>
<textarea
id="simpleMemo"
class="memo-textarea"
maxlength="300"
placeholder="오늘 하루는 어땠나요?"
></textarea>      <div class="memo-footer">
        <span id="memoCount">0 / 300</span>
        <button class="memo-save-btn">저장</button>
      </div>
    </div>
  </div>

  <div id="toast-root"></div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>
  <script src="today.js"></script>
  <script src="total.js"></script>
  <script src="mypage.js"></script>
  <script src="manual.js"></script>
</body>
</html>
