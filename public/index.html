<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">

  <!-- 네비 영역 -->
  <div class="p-6 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900">
   <h1 class="text-xl font-bold mb-4">Admin Dashboard</h1>
  <nav class="flex gap-4">
    <button data-page="today" class="px-4 py-2 bg-primary text-white rounded-lg shadow-sm hover:opacity-90 transition">Today</button>
    <button data-page="weekly" class="px-4 py-2 bg-primary text-white rounded-lg shadow-sm hover:opacity-90 transition">Weekly</button>
    <button data-page="mypage" class="px-4 py-2 bg-primary text-white rounded-lg shadow-sm hover:opacity-90 transition">My Page</button>
    <button data-page="manual" class="px-4 py-2 bg-primary text-white rounded-lg shadow-sm hover:opacity-90 transition">Manual</button>
    <button data-page="total" class="px-4 py-2 bg-primary text-white rounded-lg shadow-sm hover:opacity-90 transition">Total</button>
  </nav>
  </div>

  <main class="p-6 bg-bgLight dark:bg-bgDark min-h-screen">
    <div id="view"></div>
  </main>

  <!-- 스크립트는 body 맨 아래 -->
 
  <script src="/today.js"></script>
  <script src="/weekly.js"></script>
  <script src="/total.js"></script>
  <script src="/mypage.js"></script>
  <script src="/manual.js"></script>
 <script src="/script.js"></script>
</body>
</html>
